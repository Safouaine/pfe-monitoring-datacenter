version: "3.9"

services:
  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=admin123
      - DOCKER_INFLUXDB_INIT_ORG=esn
      - DOCKER_INFLUXDB_INIT_BUCKET=monitoring

  grafana:
    image: grafana/grafana:9.5.5
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    depends_on:
      - influxdb

  ai_engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    container_name: ai_engine
    command: python model.py
    volumes:
      - ./ai-engine:/app
    depends_on:
      - influxdb

  snmp_collector:
    build:
      context: ./snmp-collector
      dockerfile: Dockerfile
    container_name: snmp_collector
    command: python main.py
    volumes:
      - ./snmp-collector:/app
    depends_on:
      - influxdb

  web_platform:
    build:
      context: ./web-platform
      dockerfile: Dockerfile
    container_name: web_platform
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./web-platform:/app
    ports:
      - "8000:8000"
    depends_on:
      - ai_engine

volumes:
  influxdb_data:
    driver: local
  grafana_data:
    driver: local